# Full fine-tuning of D-FINE-S on Pascal VOC
# All parameters are trainable; start from COCO pretrained weights

__include__:
  - ../../dataset/pascal_voc_detection.yml

output_dir: results/full_finetune/pascal_voc

# Model
model: DFINE
backbone: HGNetV2
num_classes: 20

# All layers trainable — no freezing
freeze_backbone: False
freeze_encoder: False

# Training hyperparameters
optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone)(?=.*norm).*$'
      weight_decay: 0.0
    - params: '^(?=.*backbone).*$'
      lr: 0.00001            # 10x lower LR for backbone
    - params: '^(?!.*backbone).*$'
      lr: 0.0001
  lr: 0.0001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

lr_scheduler:
  type: MultiStepLR
  milestones: [80, 100]
  gamma: 0.1

lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500

epoches: 120
clip_max_norm: 0.1
use_amp: True
find_unused_parameters: False
sync_bn: True
use_ema: True
ema_decay: 0.9999
ema_warmup: 2000
seed: 0

# Evaluation
eval_spatial_size: [640, 640]
eval_interval: 5
checkpoint_interval: 10
