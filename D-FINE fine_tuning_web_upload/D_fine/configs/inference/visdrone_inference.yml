# VisDrone — inference only (zero-shot with COCO pretrained model)

task: detection
num_classes: 80
remap_mscoco_category: False

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: data/visdrone/images/val
    ann_file: data/visdrone/annotations/instances_val.json
    return_masks: False
    transforms:
      type: Compose
      ops:
        - {type: Resize, size: [800, 800]}
        - {type: ConvertPILImage, dtype: float32, scale: True}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn: default_collate_fn

eval_spatial_size: [800, 800]
