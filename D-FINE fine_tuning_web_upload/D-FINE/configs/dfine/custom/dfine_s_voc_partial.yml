__include__: [
  '../../dataset/pascal_voc_detection.yml',
  '../../runtime.yml',
  '../include/dataloader.yml',
  '../include/optimizer.yml',
  '../include/dfine_hgnetv2.yml',
]

output_dir: ../D_fine/results/partial_finetune/voc_S

DFINE:
  backbone: HGNetv2

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: 3       # freeze all 4 backbone stages (0,1,2,3)
  freeze_norm: True  # freeze BN in backbone too
  use_lab: True

DFINETransformer:
  num_layers: 3
  eval_idx: -1

HybridEncoder:
  in_channels: [256, 512, 1024]
  hidden_dim: 256
  depth_mult: 0.34
  expansion: 0.5

optimizer:
  type: AdamW
  params:
    - params: '^(?=.*backbone).*$'
      lr: 0.0
    - params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0004
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epochs: 10
train_dataloader:
  total_batch_size: 16
  dataset:
    transforms:
      policy:
        epoch: 8
  collate_fn:
    stop_epoch: 8
    ema_restart_decay: 0.9999
    base_size_repeat: 10

val_dataloader:
  total_batch_size: 32

eval_spatial_size: [640, 640]
